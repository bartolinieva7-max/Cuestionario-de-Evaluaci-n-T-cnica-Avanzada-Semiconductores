<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Evaluación Técnica: Semiconductores</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, #fce4ec 0%, #fff3e0 50%, #e0e7ff 100%);
            font-family: 'Segoe UI', 'Roboto', 'Poppins', system-ui, sans-serif;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .quiz-wrapper {
            max-width: 850px;
            width: 100%;
            margin: 0 auto;
            background: #fffffff0;
            backdrop-filter: blur(2px);
            border-radius: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.25);
            padding: 1.8rem;
            transition: all 0.2s;
        }

        .header {
            text-align: center;
            margin-bottom: 1.2rem;
            border-bottom: 4px solid #ff8c42;
            padding-bottom: 0.7rem;
        }

        .header h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #1e6f9f, #e67e22);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            letter-spacing: -0.2px;
        }

        .sub {
            color: #e67e22;
            font-size: 0.85rem;
            margin-top: 0.2rem;
            font-weight: 600;
        }

        .progress-area {
            background: #e6e0f0;
            border-radius: 2rem;
            padding: 0.5rem 1rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 0.5rem;
            font-size: 0.9rem;
            color: #1a4a6e;
            font-weight: 700;
        }

        .question-counter {
            font-weight: 800;
            background: #ffcc88;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            color: #5a3a1a;
        }

        .score-badge {
            background: #88ccaa;
            padding: 0.2rem 0.8rem;
            border-radius: 40px;
            font-weight: 700;
            color: #1a4a2e;
        }

        .question-card {
            background: #ffffff;
            border-radius: 1.5rem;
            padding: 1.3rem;
            margin-bottom: 1.2rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            border-left: 8px solid #ff8c42;
            border-right: 1px solid #f0e0d0;
        }

        .question-text {
            font-size: 1.08rem;
            font-weight: 800;
            color: #2c3e66;
            margin-bottom: 1.2rem;
            line-height: 1.4;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
        }

        .option {
            display: flex;
            align-items: flex-start;
            gap: 0.8rem;
            cursor: pointer;
            padding: 0.6rem 0.8rem;
            border-radius: 1rem;
            background: #fefaf5;
            border: 2px solid #e0d0c0;
            transition: all 0.15s;
        }

        .option:hover {
            background: #fff4e6;
            border-color: #ffaa66;
            transform: scale(1.01);
        }

        input[type="radio"] {
            appearance: none;
            -webkit-appearance: none;
            width: 1.2rem;
            height: 1.2rem;
            border: 2px solid #e67e22;
            border-radius: 50%;
            margin-top: 0.1rem;
            cursor: pointer;
            background: white;
            flex-shrink: 0;
        }

        input[type="radio"]:checked {
            background-color: #e67e22;
            border-color: #e67e22;
            box-shadow: inset 0 0 0 3px white;
        }

        .option label {
            flex: 1;
            font-size: 0.95rem;
            line-height: 1.4;
            cursor: pointer;
            color: #2c3e66;
            font-weight: 600;
        }

        .feedback {
            margin-top: 0.8rem;
            padding: 0.7rem 1rem;
            border-radius: 1rem;
            font-size: 0.85rem;
            background: #fef7e8;
            border-left: 5px solid;
            line-height: 1.4;
            color: #2c3e50;
        }

        .feedback.correct {
            border-left-color: #44aa66;
            background: #e0ffe8;
        }

        .feedback.incorrect {
            border-left-color: #ff6666;
            background: #ffe6e6;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn {
            border: none;
            background: #ddd0c0;
            color: #4a3a2a;
            font-weight: 800;
            padding: 0.6rem 1.3rem;
            border-radius: 60px;
            font-size: 0.9rem;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.4rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .btn-primary {
            background: #3a86ff;
            color: white;
        }

        .btn-primary:hover {
            background: #2a6ad0;
            transform: scale(1.02);
        }

        .btn-secondary {
            background: #e67e22;
            color: white;
        }

        .btn-secondary:hover {
            background: #d46a10;
        }

        .btn-reset {
            background: #cc6644;
            color: white;
        }

        .btn-reset:hover {
            background: #aa4422;
        }

        .btn-success {
            background: #44aa66;
            color: white;
        }

        .btn-success:hover {
            background: #338855;
        }

        .results-area {
            margin-top: 1.5rem;
            background: #fff2e0;
            border-radius: 1.2rem;
            padding: 1rem;
            border: 2px solid #ffaa33;
            display: none;
        }

        .results-area h3 {
            color: #cc5500;
            margin-bottom: 0.5rem;
        }

        .result-summary {
            font-size: 1rem;
            margin-bottom: 1rem;
            text-align: center;
            font-weight: bold;
            color: #1f4a2e;
        }

        .result-detail {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.8rem;
        }

        .result-item {
            padding: 0.4rem;
            border-bottom: 1px solid #ffd9a0;
            display: flex;
            gap: 0.5rem;
        }

        footer {
            text-align: center;
            font-size: 0.7rem;
            margin-top: 1.2rem;
            color: #aa8855;
        }

        @media (max-width: 600px) {
            .quiz-wrapper {
                padding: 1rem;
            }
            .question-text {
                font-size: 0.98rem;
            }
            .option label {
                font-size: 0.88rem;
            }
            .btn {
                padding: 0.5rem 1rem;
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>
<div class="quiz-wrapper">
    <div class="header">
        <h1>⚡ Semiconductores</h1>
        <div class="sub">Bandas, dopaje, materiales avanzados y arquitecturas</div>
    </div>

    <div class="progress-area">
        <span class="question-counter" id="questionCounter">Pregunta 1 / 20</span>
        <span class="score-badge" id="liveScore">✅ Aciertos: 0</span>
    </div>

    <div id="questionContainer"></div>

    <div class="nav-buttons">
        <button id="prevBtn" class="btn btn-secondary">◀ Anterior</button>
        <button id="nextBtn" class="btn btn-primary">Siguiente ▶</button>
        <button id="resetBtn" class="btn btn-reset">⟳ Reiniciar</button>
        <button id="finalScoreBtn" class="btn btn-success">📊 Ver total</button>
    </div>

    <div id="resultsPanel" class="results-area"></div>
    <footer>📌 Selecciona una opción → retroalimentación inmediata. Al finalizar, revisa tu puntuación.</footer>
</div>

<script>
    // ==================== DATOS DEL CUESTIONARIO ====================
    const questionsData = [
        { text: "Un dispositivo semiconductor presenta un fallo de rendimiento al operar a temperaturas elevadas, mostrando un aumento descontrolado de la corriente de fuga. ¿Cuál es la causa física más probable según la teoría de bandas?",
          options: ["El estrechamiento de la banda de valencia por agitación térmica.", "El solapamiento de las bandas de conducción y valencia, convirtiéndolo en metal.", "El aumento de la densidad de portadores intrínsecos que superan el bandgap estrecho.", "Una reducción en el nivel de Fermi que desplaza a los portadores hacia el núcleo atómico."],
          correct: "c",
          explanation: "Correcta (c): Un pequeño estímulo térmico permite a los electrones 'saltar' a la banda de conducción. A mayor temperatura, mayor densidad de portadores intrínsecos, degradando el diseño."
        },
        { text: "En el diseño de un transistor de alta velocidad para redes 6G que operarán en bandas de terahercios, ¿por qué se preferiría el nitruro de indio y galio (InGaN) sobre el silicio puro?",
          options: ["Porque el silicio tiene un gap directo que genera interferencias ópticas.", "Debido a la necesidad de materiales con mayor movilidad y capacidades de procesamiento de señal en frecuencias extremas.", "Porque el silicio no es compatible con las antenas masivas MIMO.", "Debido a que el InGaN tiene una conductividad térmica superior a la del cobre."],
          correct: "b",
          explanation: "Correcta (b): La evolución hacia 6G requiere nuevos materiales como InGaN para dispositivos de RF ultrarrápidos que el silicio no puede alcanzar eficientemente."
        },
        { text: "Si se requiere diseñar un inversor para un vehículo eléctrico que soporte tensiones de varios kilovoltios y temperaturas de hasta 600°C, ¿cuál es la selección de material más técnica y por qué?",
          options: ["GaN, por su capacidad de switching en decenas de MHz.", "GaAs, por su alta movilidad electrónica de 8500 cm²/V·s.", "SiC, por su banda ancha (3.2 eV) y su conductividad térmica excepcional de 4.9 W/cm·K.", "Silicio-Germanio, para aprovechar la tensión mecánica en la red cristalina."],
          correct: "c",
          explanation: "Correcta (c): El SiC es el único mencionado específicamente para soportar esas temperaturas y tensiones extremas en trenes de potencia de vehículos eléctricos, destacando su gestión térmica crítica."
        },
        { text: "Durante el dopado de silicio con Boro (trivalente), se observa que el nivel de Fermi se desplaza. ¿Hacia dónde se desplaza y cuál es la consecuencia en los portadores?",
          options: ["Hacia la banda de conducción, aumentando los electrones.", "Hacia el centro del gap, equilibrando huecos y electrones.", "Hacia la banda de valencia, estableciendo los huecos como portadores mayoritarios.", "Fuera del cristal, reduciendo la conductividad total."],
          correct: "c",
          explanation: "Correcta (c): El dopaje con elementos trivalentes crea vacancias (huecos) y desplaza el nivel de Fermi hacia la banda de valencia, definiendo un semiconductor tipo P."
        },
        { text: "¿Cuál es la ventaja diagnóstica de utilizar una arquitectura de chiplets en lugar de un diseño monolítico en nodos de 3nm?",
          options: ["Permite que todo el chip se fabrique en el nodo de 3nm para reducir costes.", "Mejora el rendimiento (yield) al reducir la probabilidad de defectos en dados más pequeños.", "Elimina la necesidad de buses de interconexión de alto ancho de banda.", "Reduce el consumo de energía al usar solo materiales de gap indirecto."],
          correct: "b",
          explanation: "Correcta (b): Los dados más pequeños tienen menor probabilidad de defecto, mejorando el 'yield' y permitiendo integrar componentes de distintos nodos (heterogeneidad)."
        },
        { text: "Un ingeniero detecta que un láser de semiconductor basado en silicio tiene una eficiencia de emisión de fotones extremadamente pobre. ¿A qué se debe esto técnicamente?",
          options: ["A que el silicio tiene un bandgap demasiado ancho (8 eV).", "Al dopado excesivo con fósforo que bloquea la luz.", "A la naturaleza del gap indirecto del silicio, que dificulta la recombinación eficiente para emitir fotones.", "A la baja conductividad térmica del silicio que sobrecalienta el láser."],
          correct: "c",
          explanation: "Correcta (c): El silicio tiene un gap indirecto, a diferencia del GaAs (gap directo), lo que impide una emisión eficiente de fotones."
        },
        { text: "En la cadena de valor de semiconductores, ¿cuál es el riesgo geopolítico crítico identificado en 2026 respecto a la fabricación avanzada?",
          options: ["La dependencia total de Europa en el diseño de herramientas EDA.", "La concentración de casi el 90% del mercado de chips sub-7nm en una sola región (Taiwán/TSMC).", "El agotamiento de las reservas mundiales de arena para obtener silicio.", "La falta de estándares de interconexión como el UCIe."],
          correct: "b",
          explanation: "Correcta (b): TSMC concentra aproximadamente el 90% de la cuota de mercado de chips avanzados, lo que representa un enorme riesgo geopolítico."
        },
        { text: "Al analizar una unión PN en polarización inversa, ¿qué sucede con la zona de agotamiento (depletion region) y el flujo de corriente?",
          options: ["La zona de agotamiento desaparece, permitiendo el flujo de corriente.", "La zona de agotamiento se estrecha, facilitando la difusión de portadores.", "La zona de agotamiento actúa como una válvula bloqueando el flujo de corriente.", "Los portadores mayoritarios se multiplican exponencialmente."],
          correct: "c",
          explanation: "Correcta (c): El campo eléctrico interno de la unión PN actúa bloqueando el flujo de corriente en polarización inversa."
        },
        { text: "¿Por qué el material SiGe es vital para la infraestructura 5G y sistemas de radar modernos?",
          options: ["Porque es el material más barato para fabricar CPUs de escritorio.", "Porque mejora la movilidad de los huecos mediante tensión mecánica, siendo ideal para transistores de radiofrecuencia de altísima velocidad.", "Debido a que emite luz azul de alta intensidad de forma natural.", "Porque sustituye por completo la necesidad de dopado tipo N."],
          correct: "b",
          explanation: "Correcta (b): La aleación de SiGe introduce tensión mecánica para mejorar la movilidad de los huecos, fundamental para transistores de heterounión (HBT) en aplicaciones de RF de alta velocidad."
        },
        { text: "En el contexto de la Inteligencia Artificial, ¿qué define al paradigma de 'Arquitectura Específica por Dominio' (DSA)?",
          options: ["El uso de GPUs genéricas para cualquier tarea de oficina.", "El diseño de silicio personalizado (como TPUs o chips de Apple) optimizado para cargas de trabajo de IA específicas.", "La fabricación de chips únicamente en nodos de 28nm para estabilidad.", "La eliminación de los núcleos de cómputo en paralelo."],
          correct: "b",
          explanation: "Correcta (b): DSA se refiere al diseño de silicio específico para un dominio (como IA), ejemplificado por las TPU de Google o chips personalizados de Apple y Amazon."
        },
        { text: "¿Qué característica técnica hace que el GaN sea ideal para cargadores de smartphones ultracompactos en comparación con el silicio tradicional?",
          options: ["Su capacidad de operar a frecuencias de switching de decenas de MHz con pérdidas mínimas.", "Que no requiere ningún tipo de encapsulado térmico.", "Que es un material flexible que se dobla fácilmente.", "Su bajísima movilidad electrónica que evita chispas."],
          correct: "a",
          explanation: "Correcta (a): El GaN permite frecuencias de conmutación muy altas con mínimas pérdidas, habilitando la reducción de tamaño en convertidores de potencia."
        },
        { text: "Un biosensor implantable necesita monitorizar glucosa sin usar baterías externas. ¿Qué tecnología descrita permite esto?",
          options: ["Litografía EUV de 2nm.", "Cosecha de energía (energy harvesting) y comunicación de bajo consumo (NFC/Bluetooth).", "El uso de transistores BJT de alta potencia.", "La integración de memorias HBM3 apiladas en 3D."],
          correct: "b",
          explanation: "Correcta (b): Los biosensores avanzados mencionados transmiten datos sin batería externa mediante técnicas de 'energy harvesting'."
        },
        { text: "Si un semiconductor tiene un bandgap de 1.12 eV y otro de 3.4 eV, ¿cuál de las siguientes afirmaciones es un diagnóstico correcto sobre su comportamiento?",
          options: ["El de 3.4 eV es un conductor metálico a temperatura ambiente.", "El de 1.12 eV (Silicio) es más propenso a fallos por temperatura que el de 3.4 eV (GaN) debido a su gap más estrecho.", "El de 3.4 eV es ideal para comunicaciones de fibra óptica por su gap indirecto.", "Ambos requieren 8 eV para permitir el flujo de electrones libres."],
          correct: "b",
          explanation: "Correcta (b): Un gap más estrecho significa que el material se vuelve intrínsecamente conductor a temperaturas más bajas que uno de banda ancha, afectando su estabilidad térmica."
        },
        { text: "¿Cuál es la función técnica del estándar UCIe en las nuevas arquitecturas de procesadores?",
          options: ["Regular el precio de mercado de los sustratos de GaAs.", "Interconectar chiplets de distintos fabricantes y nodos dentro de un mismo encapsulado.", "Definir el límite máximo de transistores según la Ley de Moore.", "Controlar la exportación de máquinas de litografía de Holanda."],
          correct: "b",
          explanation: "Correcta (b): El estándar abierto UCIe se utiliza para conectar la heterogeneidad de los chiplets dentro de un sistema en encapsulado."
        },
        { text: "En un material tipo N, ¿cuál es el origen del portador mayoritario?",
          options: ["Vacancias electrónicas creadas por átomos de boro.", "Electrones adicionales no enlazados aportados por átomos pentavalentes como el fósforo.", "Fotones de luz visible que chocan con la banda de valencia.", "La zona de agotamiento que atrae protones del núcleo."],
          correct: "b",
          explanation: "Correcta (b): El dopante pentavalente aporta un electrón adicional que queda libre para moverse, convirtiéndose en el portador mayoritario del tipo N."
        },
        { text: "¿Qué diferencia técnica fundamental existe entre una GPU Hopper (NVIDIA) y una arquitectura de chiplets como AMD Genoa?",
          options: ["Hopper es un SoC monolítico de alta densidad, mientras que Genoa usa la desintegración modular en chiplets.", "Hopper usa solo silicio-germanio y Genoa usa arseniuro de galio.", "Hopper no tiene transistores y funciona solo con fotónica.", "Genoa es un biosensor implantable y Hopper es para vehículos eléctricos."],
          correct: "a",
          explanation: "Correcta (a): Las fuentes describen a la H100 (Hopper) como un SoC monolítico y a la serie EPYC (Genoa) como un ejemplo de integración de hasta 12 chiplets."
        },
        { text: "Un dispositivo de red HVDC (corriente continua de alta tensión) requiere un material que disipe calor eficientemente. ¿Cuál elegiría basándose en su conductividad térmica?",
          options: ["GaAs (0.46 W/cm·K).", "Si (1.5 W/cm·K).", "SiC (4.9 W/cm·K).", "SiO₂ (>8 eV)."],
          correct: "c",
          explanation: "Correcta (c): El SiC destaca con una conductividad térmica de 4.9 W/cm·K, superior incluso al cobre en ciertos contextos, ideal para gestión térmica crítica."
        },
        { text: "¿Por qué el empaquetado avanzado 3D (como CoWoS o Foveros) se considera la 'nueva ley de Moore'?",
          options: ["Porque permite reducir el tamaño de los átomos de silicio por debajo de 1nm.", "Porque el progreso tecnológico migra de reducir el nodo de proceso a la integración y escalabilidad modular en 3D.", "Porque elimina el uso de semiconductores en los ordenadores.", "Porque permite que los chips funcionen sin necesidad de electricidad."],
          correct: "b",
          explanation: "Correcta (b): Con el transistor acercándose a sus límites físicos, la innovación se desplaza hacia la integración 3D y los chiplets para seguir mejorando el rendimiento."
        },
        { text: "¿Cuál es el papel del Arseniuro de Galio (GaAs) en las comunicaciones satelitales?",
          options: ["Es el material de menor coste para grandes infraestructuras.", "Se usa por su alta movilidad electrónica (~8500 cm²/V·s) y su eficiencia en optoelectrónica por su gap directo.", "Es el estándar para biosensores de glucosa por su flexibilidad.", "Se utiliza para fabricar los sustratos de las memorias de almacenamiento masivo."],
          correct: "b",
          explanation: "Correcta (b): Su altísima movilidad electrónica y su gap directo lo hacen indispensable para comunicaciones satelitales y optoelectrónica de alta eficiencia."
        },
        { text: "En un 'Vehículo Definido por Software' (SDV), ¿cuál es la función de los SoCs de 5nm como NVIDIA DRIVE Thor?",
          options: ["Gestionar únicamente el encendido de las luces del coche.", "Centralizar el procesamiento de múltiples funciones como seguridad activa (LiDAR, visión), ADAS e infoentretenimiento.", "Reemplazar todos los componentes mecánicos por transistores GaAs.", "Reducir el número de chips del coche a exactamente uno para evitar el calor."],
          correct: "b",
          explanation: "Correcta (b): Estos procesadores de dominio centralizan funciones complejas que antes estaban distribuidas, gestionando seguridad, ADAS y actualizaciones OTA simultáneamente."
        }
    ];

    let userAnswers = new Array(20).fill(null);
    let currentIndex = 0;

    const questionContainer = document.getElementById('questionContainer');
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const resetBtn = document.getElementById('resetBtn');
    const finalScoreBtn = document.getElementById('finalScoreBtn');
    const questionCounterSpan = document.getElementById('questionCounter');
    const liveScoreSpan = document.getElementById('liveScore');
    const resultsPanel = document.getElementById('resultsPanel');

    function updateLiveScore() {
        let correctCount = 0;
        for (let i = 0; i < userAnswers.length; i++) {
            if (userAnswers[i] && userAnswers[i] === questionsData[i].correct) correctCount++;
        }
        liveScoreSpan.textContent = `✅ Aciertos: ${correctCount} / 20`;
        return correctCount;
    }

    function saveAnswer(selectedLetter) {
        userAnswers[currentIndex] = selectedLetter;
        updateLiveScore();
        renderCurrentQuestion();
    }

    function renderCurrentQuestion() {
        const q = questionsData[currentIndex];
        const selected = userAnswers[currentIndex];
        const letters = ['a', 'b', 'c', 'd'];
        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const letter = letters[idx];
            const isChecked = (selected === letter);
            optionsHtml += `
                <div class="option" data-letter="${letter}">
                    <input type="radio" name="question" value="${letter}" id="opt_${letter}" ${isChecked ? 'checked' : ''}>
                    <label for="opt_${letter}"><strong>${letter.toUpperCase()})</strong> ${opt}</label>
                </div>
            `;
        });

        let feedbackHtml = '';
        if (selected) {
            const isCorrect = (selected === q.correct);
            const correctLetter = q.correct;
            const correctText = q.options[letters.indexOf(correctLetter)];
            const explanation = q.explanation;
            if (isCorrect) {
                feedbackHtml = `<div class="feedback correct">✅ <strong>¡Correcto!</strong> ${explanation}</div>`;
            } else {
                feedbackHtml = `<div class="feedback incorrect">❌ <strong>Incorrecto.</strong> La respuesta correcta es ${correctLetter.toUpperCase()}) ${correctText}.<br>${explanation}</div>`;
            }
        } else {
            feedbackHtml = `<div class="feedback" style="border-left-color:#ffcc88; background:#fff5e6;">⚡ Selecciona una opción para ver la retroalimentación.</div>`;
        }

        const html = `
            <div class="question-card">
                <div class="question-text">${q.text}</div>
                <div class="options" id="optionsContainer">
                    ${optionsHtml}
                </div>
                ${feedbackHtml}
            </div>
        `;
        questionContainer.innerHTML = html;

        // Event listeners
        const optionDivs = document.querySelectorAll('.option');
        optionDivs.forEach(div => {
            const radio = div.querySelector('input[type="radio"]');
            const letter = div.getAttribute('data-letter');
            if (radio) {
                radio.addEventListener('change', () => {
                    if (radio.checked) saveAnswer(letter);
                });
            }
            div.addEventListener('click', (e) => {
                if (e.target.tagName !== 'INPUT') {
                    const radioInside = div.querySelector('input');
                    if (radioInside && !radioInside.checked) {
                        radioInside.checked = true;
                        saveAnswer(letter);
                    }
                }
            });
        });

        questionCounterSpan.textContent = `Pregunta ${currentIndex+1} / 20`;
    }

    function showFinalResults() {
        let correctCount = 0;
        let detailsHtml = '';
        for (let i = 0; i < questionsData.length; i++) {
            const q = questionsData[i];
            const userAns = userAnswers[i];
            const isCorrect = (userAns === q.correct);
            if (isCorrect) correctCount++;
            const statusIcon = isCorrect ? '✅' : '❌';
            const userShow = userAns ? userAns.toUpperCase() : '—';
            const correctShow = q.correct.toUpperCase();
            detailsHtml += `
                <div class="result-item">
                    <span style="min-width: 30px;">${statusIcon}</span>
                    <span><strong>Pregunta ${i+1}</strong> (Tu respuesta: ${userShow} / Correcta: ${correctShow})</span>
                </div>
            `;
        }
        const percent = Math.round((correctCount / 20) * 100);
        resultsPanel.innerHTML = `
            <h3>📊 Resultado final</h3>
            <div class="result-summary">🎯 Aciertos: ${correctCount} de 20 (${percent}%)</div>
            <div class="result-detail">${detailsHtml}</div>
            <button id="closeResultsBtn" class="btn btn-secondary" style="margin-top: 10px; width:100%;">✖ Cerrar resumen</button>
        `;
        resultsPanel.style.display = 'block';
        document.getElementById('closeResultsBtn')?.addEventListener('click', () => {
            resultsPanel.style.display = 'none';
        });
        alert(`📊 Cuestionario completado.\nAciertos: ${correctCount} de 20 (${percent}%)\nRevisa el resumen detallado en pantalla.`);
    }

    function nextQuestion() {
        if (currentIndex < 19) {
            currentIndex++;
            renderCurrentQuestion();
        } else {
            const unanswered = userAnswers.filter(a => a === null).length;
            if (unanswered > 0) {
                if (confirm(`Aún tienes ${unanswered} pregunta(s) sin responder. ¿Deseas finalizar de todas formas? Las no respondidas se contarán como incorrectas.`)) {
                    showFinalResults();
                }
            } else {
                showFinalResults();
            }
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            renderCurrentQuestion();
        } else {
            alert("Ya estás en la primera pregunta.");
        }
    }

    function resetQuiz() {
        if (confirm("¿Reiniciar todo el cuestionario? Se perderán todas las respuestas.")) {
            userAnswers = new Array(20).fill(null);
            currentIndex = 0;
            resultsPanel.style.display = 'none';
            updateLiveScore();
            renderCurrentQuestion();
        }
    }

    prevBtn.addEventListener('click', prevQuestion);
    nextBtn.addEventListener('click', nextQuestion);
    resetBtn.addEventListener('click', resetQuiz);
    finalScoreBtn.addEventListener('click', showFinalResults);

    renderCurrentQuestion();
    updateLiveScore();
</script>
</body>
</html>
